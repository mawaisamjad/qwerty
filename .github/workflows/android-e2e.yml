name: Flutter Patrol E2E (Real Device)

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: android-e2e-real-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-e2e-real-device:
    runs-on: [self-hosted, linux, android-device]
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show device list
        run: |
          adb devices
          flutter devices

      - name: Ensure dependencies
        run: flutter pub get

      - name: Ensure Patrol CLI
        run: |
          dart pub global activate patrol_cli 4.3.1
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Patrol doctor
        run: patrol doctor

      # Path workaround for patrol_cli bundling bug
      - name: Prepare Patrol path workaround
        run: |
          mkdir -p patrol_test/home/runner/work/flutterproject
          ln -sfn "$GITHUB_WORKSPACE" patrol_test/home/runner/work/flutterproject/flutterproject

      - name: Run Patrol smoke on real device
        run: |
          DEVICE_ID=$(adb devices | awk 'NR>1 && $2=="device"{print $1; exit}')
          if [ -z "$DEVICE_ID" ]; then
            echo "No real Android device detected."
            exit 1
          fi
          PATROL_ANALYTICS_ENABLED=false patrol test \
            --target integration_test/smoke/app_launch_test.dart \
            -d "$DEVICE_ID" \
            --no-uninstall

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: patrol-results-real-device
          path: |
            build/**/outputs/**/*.apk
            build/**/reports/**
            build/**/test-results/**
            **/androidTest-results/**
