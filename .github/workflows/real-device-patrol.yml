name: Patrol Real Device

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: patrol-real-${{ github.ref }}
  cancel-in-progress: true

jobs:
  real-device-e2e:
    runs-on: [self-hosted, linux, android-device]
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tools and connected phone
        run: |
          flutter --version
          adb version
          adb devices
          flutter devices

      - name: Install dependencies
        run: flutter pub get

      - name: Ensure Patrol CLI
        run: |
          dart pub global activate patrol_cli 4.3.1
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Patrol doctor
        run: patrol doctor

      - name: Prepare Patrol bundler workaround
        run: |
          mkdir -p patrol_test/home/runner/work/qwerty
          ln -sfn "$GITHUB_WORKSPACE" patrol_test/home/runner/work/qwerty/qwerty

      - name: Run smoke test on real device
        run: |
          DEVICE_ID=$(adb devices | awk 'NR>1 && $2=="device"{print $1; exit}')
          if [ -z "$DEVICE_ID" ]; then
            echo "No Android device connected"
            exit 1
          fi
          PATROL_ANALYTICS_ENABLED=false patrol test --target integration_test/smoke/app_launch_test.dart -d "$DEVICE_ID" --no-uninstall

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: patrol-real-device-results
          path: |
            build/**/outputs/**/*.apk
            build/**/reports/**
            build/**/test-results/**
            **/androidTest-results/**
